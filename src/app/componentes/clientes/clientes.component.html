<section id="clientes">
    <p class="sec-eyebrow">Nos recomiendan</p>
    <h3 class="sec-title">Nuestros clientes</h3>

    <div class="cli-grid">
        <div class="cli-card" *ngFor="let comment of comments">
            <div class="cli-photo">
                <img src="{{comment.img}}" alt="{{comment.nombre}}">
            </div>
            <div class="cli-stars">
                <span *ngFor="let llena of estrellas(comment.rating)" [class.on]="llena">★</span>
            </div>
            <p class="cli-comment">{{comment.comment}}</p>
            <p class="cli-name">{{comment.nombre}}</p>
        </div>
    </div>
</section>
