<section id="products">
    <h1>Productos</h1>

    <div class="search">
        <div class="group">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><g><path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"></path></g></svg>
            <input placeholder="Search" type="search" class="input">
        </div>
    </div>

    <nz-tabset nzCentered>
        <nz-tab nzTitle="Todo" (nzClick)="changeDates('todo')"></nz-tab>
        <nz-tab nzTitle="Hombre" (nzClick)="changeDates('hombres')"></nz-tab>
        <nz-tab nzTitle="Mujer" (nzClick)="changeDates('mujeres')"></nz-tab>
        <nz-tab nzTitle="Niño/a" (nzClick)="changeDates('niños')"></nz-tab>
    </nz-tabset>
      
    <div class="categorias">
        <div  class="row"  id="container">
            <div (click)="showModal(producto)" *ngFor = "let producto of productos_aux" class="subcontainer col-lg-2 col-md-3 col-sm-3 col-xs-12">
                <div class="product">
                    <img [src]="producto.imagen" alt="" >
                    <h6>{{producto.nombre}}</h6>
                    <ul>
                        <li>Precio unidad: ${{producto.precio}}</li>
                        <li>Talla: {{producto.talla}}</li>
                        <li>Stock: {{producto.stock}}</li>
                        <li>Categoria: {{producto.categoria}}</li>
                        <li>Descripción: {{producto.descripcion}}</li>
                    </ul>
                </div> 
            </div>
        </div>
        <nz-modal id="modal" [(nzVisible)]="isVisible" nzTitle="{{producto_modal.nombre}}" (nzOnCancel)="handleCancel()" (nzOnOk)="handleOk()">
            <ng-container *nzModalContent >
                <div nz-row  class="modal-content">
                    <div nz-col nzSpan="24" class="imagen">
                        <img id="imagen_modal" src="{{producto_modal.imagen}}" alt="">
                    </div>
                </div>
            </ng-container>
        </nz-modal>
        
    </div>
</section>
